name: TS Order Manager CI

on:
    push:
        branches: [ main ]
        paths:
            - "order-manager/**"
    pull_request:
        branches: [ main ]
        paths:
            - "order-manager/**"

jobs:
    ci-order-manager:
        name: Lint, Format, and Typecheck in Order Manager
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./order-manager

        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check Formatting
              run: bun run format:check

            - name: Linting
              run: bun run lint

            - name: Type Check
              run: bun run typecheck
